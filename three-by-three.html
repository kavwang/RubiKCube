<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title data-i18n="home.card3x3.title">3x3 魔術方塊解題器</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./src/styles/main.css" />
</head>
<body class="flex flex-col h-screen overflow-hidden bg-surface-bg text-text-primary transition-colors duration-300">
  <!-- Dynamic Header Container -->
  <div id="header-container"></div>

  <!-- Main App Layout -->
  <main class="flex-1 flex flex-col md:flex-row relative overflow-hidden">
    <!-- Panel Container -->
    <div id="panel-container"></div>

    <!-- Viewer Container (Three.js Scene) -->
    <section class="flex-1 relative h-[48vh] md:h-full overflow-hidden">
      <!-- 3D Canvas Mounting Point -->
      <div class="w-full h-full" id="viewer"></div>

      <!-- FPS Counter Overlay -->
      <div id="fpsCounter" class="absolute top-4 right-4 px-2.5 py-1 text-[10px] font-mono font-bold rounded-lg border border-border-primary bg-surface-panel/40 backdrop-blur-md text-text-secondary select-none">
        -- FPS
      </div>
    </section>
  </main>

  <script type="module" src="./three-by-three.js"></script>
</body>
</html>
