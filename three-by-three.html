<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3x3 魔術方塊解題器</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./app-theme.css" />
  <link rel="stylesheet" href="./three-by-three.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main class="app">
    <section class="panel" id="controlPanel">
      <div class="panel-header">
        <h1>3x3 魔術方塊解題器</h1>
        <div class="panel-header-actions">
          <a class="btn btn-mini" href="./index.html">回首頁</a>
          <button id="togglePanelBtn">收合選單</button>
        </div>
      </div>

      <div class="mode-toggle-container">
        <button id="editModeBtn" class="mode-btn active">編輯顏色</button>
        <button id="solveModeBtn" class="mode-btn">開始解題</button>
      </div>

      <div id="editPanel" class="mode-section">
        <p class="hint">可輸入打亂公式，或用色票點擊 3D 貼紙做教學展示。</p>
        <label class="hint" for="scrambleInput">打亂公式（例：<code>R U R' U' F2</code>）</label>
        <textarea id="scrambleInput" rows="4" placeholder="例如：R U R' U' F2 D L2"></textarea>

        <div class="actions">
          <button id="randomBtn" class="btn">隨機打亂</button>
          <button id="applyBtn" class="btn">套用打亂</button>
        </div>

        <div class="palette" id="palette"></div>

        <div class="actions">
          <button id="fillSolvedBtn" class="btn">填入已復原</button>
          <button id="clearBtn" class="btn btn-danger">清空顏色</button>
        </div>
      </div>

      <div id="solvePanel" class="mode-section hidden">
        <div class="solver-toggle-container lbl-active">
          <div class="solver-toggle-slider"></div>
          <button id="lblBtn" class="solver-toggle-btn active">LBL 分層解法</button>
          <button id="fastestBtn" class="solver-toggle-btn">雙向最速解</button>
        </div>
        <div class="actions main-solve">
          <button id="solveBtn" class="btn btn-primary">開始求解</button>
        </div>
        <p class="hint" style="margin-top: 4px;">3x3 以分層解構（第一層 / 第二層 / 第三層）顯示教學步驟。</p>

        <div class="actions secondary">
          <button id="resetBtn" class="btn" disabled>回到起點</button>
          <button id="nextBtn" class="btn" disabled>下一步</button>
          <button id="autoBtn" class="btn" disabled>自動播放</button>
        </div>
      </div>

      <div class="status-container">
        <div class="status-title">狀態提示</div>
        <div class="status" id="status">請先輸入或產生打亂公式。</div>
      </div>

      <div class="steps-container">
        <div class="steps-header">
          <h2>解題步驟</h2>
          <span id="stepCounter" class="step-counter">0 / 0</span>
        </div>
        <div class="steps">
          <ol id="stepsList"></ol>
        </div>
      </div>
    </section>

    <section class="viewer-wrap">
      <div id="viewer"></div>
    </section>
  </main>

  <script type="module" src="./three-by-three.js"></script>
</body>
</html>
